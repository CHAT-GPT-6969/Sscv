<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC Result 2025</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

/* Header */
.header {
    background: #0a4f7a;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* Form Box */
.container {
    max-width: 400px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #0a4f7a;
    color: white;
    border: none;
    cursor: pointer;
}

/* Captcha */
.captcha-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.captcha {
    font-weight: bold;
    background: #ddd;
    padding: 8px;
}

/* Result Page */
.result {
    display: none;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

.pass {
    color: green;
    font-weight: bold;
}

/* Mobile */
@media(max-width: 500px){
    .container, .result {
        margin: 10px;
    }
}
</style>
</head>

<body>

<div class="header">
SSC Examination Result 2025
</div>

<div class="container">
    <input type="text" id="roll" placeholder="Enter Roll Number">
    <input type="text" id="mother" placeholder="Mother Name">

    <div class="captcha-box">
        <div class="captcha" id="captcha"></div>
        <button onclick="generateCaptcha()">↻</button>
    </div>

    <input type="text" id="captchaInput" placeholder="Enter Captcha">

    <button onclick="checkResult()">View Result</button>
</div>

<div class="result" id="resultBox">
    <h3>SSC EXAMINATION RESULT</h3>
    <p><b>Name:</b> Rahul Sharma</p>

    <table>
        <tr>
            <th>Code</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>

        <tr><td>01</td><td>Marathi</td><td>76</td><td>B1</td></tr>
        <tr><td>27</td><td>Sanskrit</td><td>98</td><td>A1</td></tr>
        <tr><td>17</td><td>English</td><td>91</td><td>A2</td></tr>
        <tr><td>71</td><td>Mathematics</td><td>92</td><td>A2</td></tr>
        <tr><td>72</td><td>Science</td><td>92</td><td>A2</td></tr>
        <tr><td>73</td><td>Social Science</td><td>86</td><td>B1</td></tr>
    </table>

    <br>

    <table>
        <tr>
            <td><b>Percentage</b></td>
            <td>92.40%</td>
        </tr>
        <tr>
            <td><b>Total Marks</b></td>
            <td>459 / 500</td>
        </tr>
        <tr>
            <td><b>Result</b></td>
            <td class="pass">PASS</td>
        </tr>
        <tr>
            <td><b>Remarks</b></td>
            <td>Excellent Performance</td>
        </tr>
    </table>
</div>

<script>
let currentCaptcha = "";

// Generate captcha
function generateCaptcha() {
    let chars = "ABCDEFGH123456789";
    currentCaptcha = "";
    for (let i = 0; i < 5; i++) {
        currentCaptcha += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captcha").innerText = currentCaptcha;
}

// Check result
function checkResult() {
    let userCaptcha = document.getElementById("captchaInput").value;

    if(userCaptcha !== currentCaptcha){
        alert("Wrong Captcha ❌");
        return;
    }

    document.querySelector(".container").style.display = "none";
    document.getElementById("resultBox").style.display = "block";
}

// Load captcha first time
generateCaptcha();
</script>

</body>
</html>
